[ref_section]
color=Green

[main_section]
single_product=pear
list_of_products_c=apple,banana,pear,ford_model_t
list_of_products_nl=
    apple
    banana
    pear
    ford_model_t
# Note: For dict_of_products the parser will automatically make a dict using the section name (e.g. apple)
#       as the key and the Product class instance as the value
dict_of_products=apple,banana,pear,ford_model_t
list_of_str=
    one
    two
    three

[fruit]
product_type=Fruit
grows_on_plants=Yes

[car]
product_type=Vehicle
grows_on_plants=No

[apple]
__inherits_from__=fruit
name=Granny Smith
weight=15
color=${ref_section.color}

[banana]
__config_class__=tests.test_dynamic_dynamic_reference.EdibleProduct
__inherits_from__=fruit
name=Over-ripe
weight=10
color=${ref_section.color}
calories=105

[pear]
__inherits_from__=fruit
name=Best Pear
weight=18
color=Yellow

[ford_model_t]
__inherits_from__ = car
name=Model T
weight=750000
manufacturer=Ford